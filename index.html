<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카피라이팅 바이블 카드 · v2</title>
<style>
  :root{
    --bg:#F4F5F7; --surface:#FFFFFF; --text:#1A1D24; --text-sub:#6B7280; --border:#E5E7EB;
    --primary:#4F46E5; --primary-soft:#EEF2FF;
    --sure:#16A34A; --sure-soft:#DCFCE7;
    --maybe:#D97706; --maybe-soft:#FEF3C7;
    --unknown:#DC2626; --unknown-soft:#FEE2E2;
    --shadow:0 4px 16px rgba(17,24,39,.08);
    --shadow-card:0 8px 28px rgba(17,24,39,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,"Segoe UI","Noto Sans KR",Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; justify-content:center; padding:20px 16px 40px;
  }
  .app{width:100%; max-width:480px; display:flex; flex-direction:column; gap:18px}

  /* 상단 바 */
  .header{display:flex; justify-content:space-between; align-items:center}
  .header .brand{font-size:15px; font-weight:800; letter-spacing:-.3px}
  .sound-toggle{background:var(--surface); border:1px solid var(--border); border-radius:99px;
    padding:6px 12px; font-size:13px; cursor:pointer; color:var(--text-sub); font-family:inherit}
  .sound-toggle.on{color:var(--primary); border-color:var(--primary); background:var(--primary-soft)}

  /* 진행률 */
  .topbar{display:none; flex-direction:column; gap:8px}
  .topbar.show{display:flex}
  .prog-meta{display:flex; justify-content:space-between; align-items:baseline; font-size:13px; color:var(--text-sub)}
  .prog-meta b{color:var(--text); font-size:14px}
  .prog-track{height:8px; border-radius:99px; background:var(--border); overflow:hidden}
  .prog-fill{height:100%; width:0%; background:var(--primary); border-radius:99px; transition:width .3s ease}

  .screen{display:none; flex-direction:column; gap:16px}
  .screen.active{display:flex}

  /* 시작 화면 */
  .hero{text-align:center; padding:6px 0 2px}
  .hero h1{font-size:22px; letter-spacing:-.3px}
  .hero p{margin-top:6px; font-size:13px; color:var(--text-sub)}

  .seg-label{font-size:13px; font-weight:700; color:var(--text-sub); margin:2px 2px -4px}
  .modes{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}
  .mode{background:var(--surface); border:1.5px solid var(--border); border-radius:14px;
    padding:12px 8px; cursor:pointer; text-align:center; font-family:inherit; transition:border-color .15s, transform .05s}
  .mode:active{transform:scale(.98)}
  .mode.sel{border-color:var(--primary); background:var(--primary-soft)}
  .mode .ic{font-size:20px}
  .mode .nm{font-size:13px; font-weight:700; margin-top:4px; color:var(--text)}
  .mode .ds{font-size:11px; color:var(--text-sub); margin-top:2px; line-height:1.3}

  .cat-list{display:flex; flex-direction:column; gap:10px}
  .cat-btn{display:flex; justify-content:space-between; align-items:center;
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:15px 18px; cursor:pointer; box-shadow:var(--shadow); text-align:left;
    font-size:15px; font-weight:600; color:var(--text); transition:border-color .15s, transform .05s; font-family:inherit}
  .cat-btn:hover{border-color:var(--primary)}
  .cat-btn:active{transform:scale(.99)}
  .cat-btn.all{background:var(--primary); color:#fff; border-color:var(--primary)}
  .cat-btn .count{font-size:13px; font-weight:600; color:var(--text-sub);
    background:var(--primary-soft); padding:3px 10px; border-radius:99px}
  .cat-btn.all .count{color:#fff; background:rgba(255,255,255,.22)}
  .cat-btn:disabled{opacity:.45; cursor:not-allowed}

  /* 카드 공통 */
  .card{background:var(--surface); border-radius:20px; box-shadow:var(--shadow-card);
    min-height:280px; padding:24px; display:flex; flex-direction:column; animation:fade .3s ease}
  @keyframes fade{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  @keyframes pop{0%{transform:scale(.96)} 60%{transform:scale(1.02)} 100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}}
  .tag{align-self:flex-start; font-size:13px; font-weight:600; color:var(--primary);
    background:var(--primary-soft); padding:4px 12px; border-radius:99px}

  /* 카드학습 앞/뒤 */
  .front-body{flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; gap:14px; padding:12px 0}
  .front-body .concept{font-size:28px; font-weight:800; letter-spacing:-.5px; line-height:1.3}
  .hint{font-size:13px; color:var(--text-sub)}
  .back-body{flex:1; display:flex; flex-direction:column; gap:12px; padding-top:14px}
  .back-body .concept-sm{font-size:15px; font-weight:700; color:var(--text-sub)}
  .back-body .meaning{font-size:19px; font-weight:700; line-height:1.5}
  .back-body .principle{font-size:16px; line-height:1.6}
  .back-body .example{font-size:16px; line-height:1.6; font-style:italic; color:var(--text-sub); border-left:3px solid var(--border); padding-left:12px}
  .back-body .cap{font-size:13px; color:var(--text-sub)}

  /* 퀴즈/후킹 질문 */
  .q-head{font-size:13px; color:var(--text-sub); font-weight:600}
  .q-title{font-size:22px; font-weight:800; line-height:1.35; margin-top:8px}
  .q-sub{font-size:14px; color:var(--text-sub); margin-top:6px}
  .options{display:flex; flex-direction:column; gap:10px; margin-top:18px}
  .opt{background:var(--surface); border:1.5px solid var(--border); border-radius:14px;
    padding:14px 16px; font-size:15px; line-height:1.5; cursor:pointer; text-align:left; font-family:inherit; color:var(--text); transition:border-color .12s, background .12s}
  .opt:hover:not(:disabled){border-color:var(--primary)}
  .opt:disabled{cursor:default}
  .opt.correct{background:var(--sure-soft); border-color:var(--sure); color:var(--sure); font-weight:700; animation:pop .35s ease}
  .opt.wrong{background:var(--unknown-soft); border-color:var(--unknown); color:var(--unknown); animation:shake .35s ease}
  .opt.dim{opacity:.5}
  .ab-tag{display:inline-block; font-weight:800; margin-right:8px; color:var(--primary)}
  .feedback{margin-top:14px; font-size:14px; font-weight:600; min-height:20px}
  .feedback.ok{color:var(--sure)} .feedback.no{color:var(--unknown)}
  .next-wrap{margin-top:14px}

  /* 버튼 */
  .btn{border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; transition:filter .12s, transform .05s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--primary); color:#fff; width:100%; box-shadow:var(--shadow)}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-ghost{background:var(--surface); color:var(--primary); border:1.5px solid var(--primary); width:100%}

  .grade{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px}
  .g{min-height:52px; border:1.5px solid; border-radius:14px; font-weight:700; font-size:15px; cursor:pointer; font-family:inherit; transition:filter .12s, transform .05s}
  .g:active{transform:scale(.97)} .g:hover{filter:brightness(.97)}
  .g.sure{background:var(--sure-soft); color:var(--sure); border-color:var(--sure)}
  .g.maybe{background:var(--maybe-soft); color:var(--maybe); border-color:var(--maybe)}
  .g.unknown{background:var(--unknown-soft); color:var(--unknown); border-color:var(--unknown)}
  @media(max-width:360px){ .grade{grid-template-columns:1fr} .modes{grid-template-columns:1fr} }

  /* 완료 화면 */
  .done{background:var(--surface); border-radius:20px; box-shadow:var(--shadow-card); padding:28px 24px; text-align:center; display:flex; flex-direction:column; gap:6px; animation:fade .3s ease}
  .done .check{font-size:44px}
  .done h2{font-size:20px; margin-top:4px}
  .done .lead{font-size:14px; color:var(--text-sub)}
  .stats{display:flex; justify-content:center; gap:10px; margin:18px 0 6px; flex-wrap:wrap}
  .stat{flex:1; min-width:92px; background:var(--primary-soft); border-radius:14px; padding:14px 10px}
  .stat .num{font-size:22px; font-weight:800; color:var(--primary)}
  .stat .lbl{font-size:12px; color:var(--text-sub); margin-top:2px}
  .done-btns{display:flex; flex-direction:column; gap:10px; margin-top:16px}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <span class="brand">카피라이팅 바이블 카드</span>
    <button class="sound-toggle" id="soundBtn" onclick="toggleSound()">🔇 소리 꺼짐</button>
  </div>

  <div class="topbar" id="topbar">
    <div class="prog-meta">
      <span id="remainLabel">—</span>
      <span id="scoreLabel"></span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </div>

  <!-- 시작 -->
  <section class="screen active" id="startScreen">
    <div class="hero">
      <h1>학습 모드를 고르세요</h1>
      <p>개념을 <b>안 보고 떠올리는</b> 전뇌화 레벨 2 · v2</p>
    </div>
    <div class="seg-label">모드</div>
    <div class="modes" id="modeSel"></div>
    <div class="seg-label">카테고리</div>
    <div class="cat-list" id="catList"></div>
  </section>

  <!-- 학습(공통 카드 영역) -->
  <section class="screen" id="studyScreen">
    <div class="card" id="card"></div>
    <div id="actionArea"></div>
  </section>

  <!-- 완료 -->
  <section class="screen" id="doneScreen"></section>
</div>

<script>
/* ===== 상수 (spec §5) ===== */
const GAP_MID = 5, GAP_HARD = 3;

/* ===== 카드 데이터 36장 ===== */
const CARDS = [
  {id:"wealth-01",category:"부의 공식",front:"부의 공식 (Q×P)",meaning:"수익 = 판매 개수(Q) × 개당 이익(P)",principle:"부자는 P(몸값)가 아니라 Q(판매량)를 무한 확장한다",example:"",effect:"",stage:""},
  {id:"wealth-02",category:"부의 공식",front:"덧셈 게임 vs 곱셈 게임",meaning:"시간×시급(덧셈, 1일 8시간) vs 상품×판매(곱셈, 24시간 자동)",principle:"지식을 '시간'으로 팔면 덧셈, '상품'으로 만들면 곱셈",example:"",effect:"",stage:""},
  {id:"wealth-03",category:"부의 공식",front:"AI 증폭기",meaning:"실력 × AI = 결과물",principle:"실력 0이면 0×100=0. 실력이 기본 전제",example:"",effect:"",stage:""},
  {id:"wealth-04",category:"부의 공식",front:"글쓰기 = 곱셈 레버리지",meaning:"한 번 만든 글이 24시간 수백·수천 번 일한다",principle:"AI 시대 글쓰기 생산성 3배, 콘텐츠 출력 10배",example:"",effect:"",stage:""},

  {id:"psych-01",category:"7가지 심리 버튼",front:"호기심",meaning:"아는 것과 알고 싶은 것 사이의 빈칸을 고통으로 느낀다",principle:"작동 원리: 정보 격차 이론 (격차를 만들어 클릭 유도)",example:"\u201C왜 부자들은 가계부를 안 쓸까?\u201D",effect:"클릭률 3배 · 제목/헤드라인",stage:"주목"},
  {id:"psych-02",category:"7가지 심리 버튼",front:"오리엔팅",meaning:"예상 밖 자극이 오면 뇌가 하던 일을 멈추고 주의를 쏟는다",principle:"작동 원리: 예상 오류 자극",example:"\u201C당신이 가난한 이유는 너무 열심히 일하기 때문\u201D",effect:"시선 집중 0.2초 · 첫 문장",stage:"주목"},
  {id:"psych-03",category:"7가지 심리 버튼",front:"사회적 증거",meaning:"다수의 선택 = 정답이라는 생존 알고리즘",principle:"작동 원리: 동조 심리",example:"\u201C누적 판매 1,423건, 5차 재입고 완료\u201D",effect:"전환율 60~70% · 리뷰/후기",stage:"신뢰"},
  {id:"psych-04",category:"7가지 심리 버튼",front:"권위",meaning:"권위자 앞에서 자기 판단을 유보하고 책임을 떠넘긴다",principle:"작동 원리: 전문가 신뢰",example:"\u201C토익 만점 15회, 강남 YBM 1타 강사\u201D",effect:"신뢰도 65%↑ · 자격/경력",stage:"신뢰"},
  {id:"psych-05",category:"7가지 심리 버튼",front:"참조점",meaning:"처음 본 숫자에 '닻'을 내리고 그 근처에서 가치를 판단한다",principle:"작동 원리: 앵커 효과",example:"\u201C정상가 180,000 → 특별가 39,000\u201D",effect:"가치 인식 2배 · 가격 제시",stage:"가치"},
  {id:"psych-06",category:"7가지 심리 버튼",front:"프레이밍",meaning:"같은 사실도 어떤 틀에 담느냐에 따라 인식이 180도 달라진다",principle:"작동 원리: 틀(프레임) 재구성",example:"\u201C수강료 30만 원\u201D → \u201C월 수익 자산 투자 30만 원\u201D",effect:"구매 의사 40%↑ · 가치 제안",stage:"가치"},
  {id:"psych-07",category:"7가지 심리 버튼",front:"손실 회피",meaning:"얻는 기쁨보다 잃는 고통을 2~2.5배 더 크게 느낀다",principle:"작동 원리: 전망 이론",example:"\u201C지금 안 사면 40% 할인이 사라집니다\u201D",effect:"구매 전환 2배 · CTA/마감",stage:"행동"},

  {id:"aida-01",category:"AIDA",front:"Attention (주목)",meaning:"RAS 통과 첫 3초 — 호기심·오리엔팅·예상 깨기",principle:"심리 반응: \u201C어? 뭐지?\u201D",example:"",effect:"목표: 시선 정지",stage:""},
  {id:"aida-02",category:"AIDA",front:"Interest (흥미)",meaning:"문제 제기 + 공감 형성 — 고통 구체화, \u201C당신 탓 아닙니다\u201D",principle:"심리 반응: \u201C내 얘기네\u201D",example:"",effect:"목표: 관심 유지",stage:""},
  {id:"aida-03",category:"AIDA",front:"Desire (욕구)",meaning:"솔루션 + 증거 + 오퍼 — After 상태, 데이터·후기, FAB",principle:"심리 반응: \u201C갖고 싶다\u201D",example:"",effect:"목표: 욕구 생성",stage:""},
  {id:"aida-04",category:"AIDA",front:"Action (행동)",meaning:"반론 처리 + 긴급성 + CTA — 망설임 제거, 손실 회피",principle:"심리 반응: \u201C지금 사자\u201D",example:"",effect:"목표: 즉시 행동",stage:""},

  {id:"hook-01",category:"후킹 5무기",front:"숫자로 끌어당기기",meaning:"공식: 구체적 숫자 + 기간 + 결과",principle:"뇌는 모호함을 싫어하고 확실한 숫자를 좋아한다",example:"\u201C하루 2시간 투자로 3개월 만에 월 200만 원 버는 법\u201D",effect:"",stage:""},
  {id:"hook-02",category:"후킹 5무기",front:"상식 뒤집기",meaning:"공식: 통념 부정 + 새로운 진실",principle:"이미 아는 내용은 무시, 예상을 깨면 반사적으로 집중",example:"\u201C열심히 하면 성공\u201D → \u201C가난한 이유는 너무 열심히 일하기 때문\u201D",effect:"",stage:""},
  {id:"hook-03",category:"후킹 5무기",front:"고민 건드리기",meaning:"공식: 치명적 실수 + 손실 경고",principle:"손실 회피 — \u201C하면 좋아요\u201D보다 \u201C안 하면 큰일\u201D이 강하다",example:"\u201C이걸 모르면, 열심히 살아도 결국 가난해집니다\u201D",effect:"",stage:""},
  {id:"hook-04",category:"후킹 5무기",front:"궁금증 자극하기",meaning:"공식: 놀라운 결과 + 숨겨진 원인",principle:"호기심은 '조금 알 때' 강해짐 → 다 보여주지 말고 살짝만",example:"\u201C월 1,000만 원 버는 사람들은 '이것' 하나에 목숨 겁니다\u201D",effect:"",stage:""},
  {id:"hook-05",category:"후킹 5무기",front:"전문성 보여주기",meaning:"공식: 권위자·기관·데이터 + 주장",principle:"전문가 앞에서 판단 유보 (내가 전문가면 드러내고, 초보면 빌림)",example:"\u201C워런 버핏이 주식 투자 전 반드시 체크하는 3가지\u201D",effect:"",stage:""},

  {id:"sec-01",category:"9섹션 프레임워크",front:"① 후킹",meaning:"목표: 3초 안에 멈춰 세우기",principle:"핵심: 호기심 + 오리엔팅 반응",example:"반응: \u201C어? 뭐지?\u201D",effect:"AIDA: Attention",stage:""},
  {id:"sec-02",category:"9섹션 프레임워크",front:"② 문제 제기",meaning:"목표: 문제 인식시키기",principle:"핵심: 표면적 문제 + 진짜 고통",example:"반응: \u201C내 얘기네\u201D",effect:"AIDA: Interest",stage:""},
  {id:"sec-03",category:"9섹션 프레임워크",front:"③ 공감",meaning:"목표: 신뢰 구축",principle:"핵심: 구체적 상황 묘사 (CCTV로 본 듯)",example:"반응: \u201C나도 그랬어\u201D",effect:"AIDA: Interest",stage:""},
  {id:"sec-04",category:"9섹션 프레임워크",front:"④ 솔루션",meaning:"목표: 해결책 제시",principle:"핵심: FAB 공식 (기능이 아닌 변화)",example:"반응: \u201C이게 답이야\u201D",effect:"AIDA: Desire",stage:""},
  {id:"sec-05",category:"9섹션 프레임워크",front:"⑤ 증거",meaning:"목표: 신뢰 확보",principle:"핵심: 데이터·후기·권위·케이스",example:"반응: \u201C믿어도 돼?\u201D",effect:"AIDA: Desire",stage:""},
  {id:"sec-06",category:"9섹션 프레임워크",front:"⑥ 오퍼",meaning:"목표: 구매 의사 결정",principle:"핵심: 앵커·보너스·보장",example:"반응: \u201C이 가격에?\u201D",effect:"AIDA: Desire",stage:""},
  {id:"sec-07",category:"9섹션 프레임워크",front:"⑦ 반론 처리",meaning:"목표: 저항 제거",principle:"핵심: 5가지 반론 패턴 대응",example:"반응: \u201C그건 안 돼\u201D",effect:"AIDA: Action",stage:""},
  {id:"sec-08",category:"9섹션 프레임워크",front:"⑧ 긴급성",meaning:"목표: 즉시 행동 유도",principle:"핵심: 희소성 + 긴급성",example:"반응: \u201C지금 안 사면\u201D",effect:"AIDA: Action",stage:""},
  {id:"sec-09",category:"9섹션 프레임워크",front:"⑨ CTA",meaning:"목표: 구매 완료",principle:"핵심: 명확한 행동 지시",example:"반응: \u201C지금 시작해\u201D",effect:"AIDA: Action",stage:""},

  {id:"tppge-01",category:"TPPGE 체크리스트",front:"Target",meaning:"누구에게? (타깃 1명 정의)",principle:"",example:"",effect:"",stage:""},
  {id:"tppge-02",category:"TPPGE 체크리스트",front:"Problem",meaning:"진짜 고통은 무엇인가?",principle:"",example:"",effect:"",stage:""},
  {id:"tppge-03",category:"TPPGE 체크리스트",front:"Promise",meaning:"어떤 변화를 약속하는가?",principle:"",example:"",effect:"",stage:""},
  {id:"tppge-04",category:"TPPGE 체크리스트",front:"Goal",meaning:"어떤 행동을 시키고 싶은가?",principle:"",example:"",effect:"",stage:""},
  {id:"tppge-05",category:"TPPGE 체크리스트",front:"Emotion",meaning:"지금 고객의 감정 온도는?",principle:"",example:"",effect:"",stage:""},
  {id:"tppge-06",category:"TPPGE 체크리스트",front:"USP",meaning:"나만의 독보적 가치는?",principle:"",example:"",effect:"",stage:""},

  {id:"fab-01",category:"FAB 공식",front:"FAB 공식",meaning:"Feature(기능) → Benefit(혜택·변화)",principle:"\u201C기능이 아닌 변화를 팔아라.\u201D 9섹션 ④솔루션의 핵심",example:"",effect:"",stage:""},
];
const CATEGORIES = ["부의 공식","7가지 심리 버튼","AIDA","후킹 5무기","9섹션 프레임워크","TPPGE 체크리스트","FAB 공식"];
const MODES = [
  {key:"recall", ic:"🃏", nm:"카드 학습", ds:"백지 인출"},
  {key:"quiz",   ic:"📝", nm:"객관식 퀴즈", ds:"뜻 고르기"},
  {key:"hook",   ic:"🎯", nm:"후킹 판별", ds:"예시 A·B"},
];

/* ===== 상태 ===== */
let mode="recall", lastCat="전체", soundOn=false;
let queue=[], sessionCards=[], currentCard=null, masteredCount=0, totalCount=0, startTime=0; // recall
let quizList=[], quizIdx=0, quizCorrect=0; // quiz/hook 공통

/* ===== 유틸 ===== */
const $=id=>document.getElementById(id);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}
function poolOf(cat){return cat==='전체'?CARDS.slice():CARDS.filter(c=>c.category===cat);}
function isCopy(c){return c.example && c.example.charAt(0)==='\u201C';} // 실제 카피 예시(따옴표로 시작)만
function sample(arr,n,exclude){const p=arr.filter(x=>x!==exclude);shuffle(p);return p.slice(0,n);}

/* ===== 사운드(선택, Web Audio · 외부파일 없음) ===== */
let actx=null;
function toggleSound(){
  soundOn=!soundOn;
  $('soundBtn').textContent = soundOn?'🔊 소리 켜짐':'🔇 소리 꺼짐';
  $('soundBtn').classList.toggle('on',soundOn);
  if(soundOn && !actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
}
function beep(freq,dur){
  if(!soundOn||!actx)return;
  try{
    const o=actx.createOscillator(),g=actx.createGain();
    o.frequency.value=freq; o.type='sine'; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(.001,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.15,actx.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
const sndOk =()=>beep(660,.16);
const sndNo =()=>beep(180,.22);

/* ===== 시작 화면 ===== */
function renderStart(){
  $('modeSel').innerHTML = MODES.map(m=>
    `<button class="mode ${m.key===mode?'sel':''}" onclick="selectMode('${m.key}')">
       <div class="ic">${m.ic}</div><div class="nm">${m.nm}</div><div class="ds">${m.ds}</div>
     </button>`).join('');
  renderCats();
}
function selectMode(k){ mode=k; renderStart(); }
function renderCats(){
  let html = `<button class="cat-btn all" onclick="startSession('전체')">전체 <span class="count">${countFor('전체')}</span></button>`;
  CATEGORIES.forEach(cat=>{
    const n=countFor(cat), disabled = n===0;
    html += `<button class="cat-btn" ${disabled?'disabled':''} onclick="startSession('${cat}')">${esc(cat)} <span class="count">${disabled?'예시 없음':n}</span></button>`;
  });
  $('catList').innerHTML = html;
}
/* 모드별 이 카테고리에서 낼 수 있는 문항 수 */
function countFor(cat){
  const pool=poolOf(cat);
  if(mode==='hook') return pool.filter(isCopy).length + '문항';
  return pool.length + '장';
}

/* ===== 세션 시작 라우터 ===== */
function startSession(cat){
  lastCat=cat;
  $('topbar').classList.add('show');
  showScreen('studyScreen');
  if(mode==='recall') startRecall(cat);
  else if(mode==='quiz') startQuiz(cat);
  else startHook(cat);
}

/* ===================== 모드1 · 카드 학습(백지 인출) ===================== */
function startRecall(cat){
  const pool=poolOf(cat);
  sessionCards=pool.map(c=>({...c,status:'new',seenCount:0,lastResult:null}));
  queue=shuffle(sessionCards.slice());
  totalCount=sessionCards.length; masteredCount=0; startTime=Date.now();
  $('scoreLabel').innerHTML='';
  updateRecallProgress(); recallCard();
}
function recallCard(){
  if(queue.length===0){ finishRecall(); return; }
  currentCard=queue[0];
  $('card').innerHTML=
    `<span class="tag">${esc(currentCard.category)}</span>
     <div class="front-body">
       <div class="concept">${esc(currentCard.front)}</div>
       <div class="hint">뜻을 머릿속으로 떠올려 보세요</div>
     </div>`;
  $('actionArea').innerHTML=`<button class="btn btn-primary" onclick="flip()">뒤집기</button>`;
}
function flip(){
  const c=currentCard;
  let b=`<div class="concept-sm">${esc(c.front)}</div><div class="meaning">${esc(c.meaning)}</div>`;
  if(c.principle) b+=`<div class="principle">${esc(c.principle)}</div>`;
  if(c.example)   b+=`<div class="example">${esc(c.example)}</div>`;
  const caps=[c.effect, (c.stage && !String(c.effect).includes(c.stage))?'단계: '+c.stage:''].filter(Boolean);
  if(caps.length) b+=`<div class="cap">${esc(caps.join(' · '))}</div>`;
  $('card').innerHTML=`<span class="tag">${esc(c.category)}</span><div class="back-body">${b}</div>`;
  $('actionArea').innerHTML=
    `<div class="grade">
       <button class="g sure" onclick="grade('확실')">✓ 확실</button>
       <button class="g maybe" onclick="grade('긴가민가')">~ 긴가민가</button>
       <button class="g unknown" onclick="grade('모름')">✕ 모름</button>
     </div>`;
}
function grade(result){
  const card=queue.shift(); card.seenCount++; card.lastResult=result;
  if(result==='확실'){ card.status='mastered'; masteredCount++; }
  else{
    card.status='reviewing';
    const gap=(result==='모름')?GAP_HARD:GAP_MID;
    queue.splice(Math.min(gap,queue.length),0,card);
  }
  updateRecallProgress(); recallCard();
}
function updateRecallProgress(){
  const pct=totalCount?Math.round(masteredCount/totalCount*100):0;
  $('progFill').style.width=pct+'%';
  $('remainLabel').textContent=`남은 카드 ${queue.length}장`;
  $('scoreLabel').innerHTML=`<b>${masteredCount}</b> / ${totalCount} 정복 (${pct}%)`;
}
function finishRecall(){
  const reviews=sessionCards.reduce((s,c)=>s+(c.seenCount-1),0);
  const t=fmtTime(Date.now()-startTime);
  doneScreen('🎉','카드 학습 완료!','모든 카드를 "확실"로 정복했어요.',[
    ['학습 카드',totalCount],['다시 본 횟수',reviews],['소요 시간',t]
  ]);
}

/* ===================== 모드2 · 객관식 퀴즈 ===================== */
function startQuiz(cat){
  const pool=poolOf(cat);
  quizList=shuffle(pool.slice()).map(c=>{
    const distract=sample(CARDS,3,c).map(d=>d.meaning);
    const opts=shuffle([c.meaning,...distract]);
    return {card:c, opts, answer:c.meaning};
  });
  quizIdx=0; quizCorrect=0; startTime=Date.now();
  renderQuiz();
}
function renderQuiz(){
  if(quizIdx>=quizList.length){ finishQuizLike('📝','퀴즈 완료!'); return; }
  const q=quizList[quizIdx];
  updateQuizProgress();
  $('card').innerHTML=
    `<span class="tag">${esc(q.card.category)}</span>
     <div style="flex:1">
       <div class="q-head">이 개념의 핵심 뜻은?</div>
       <div class="q-title">${esc(q.card.front)}</div>
       <div class="options" id="opts">
         ${q.opts.map((o,i)=>`<button class="opt" onclick="answerQuiz(${i})">${esc(o)}</button>`).join('')}
       </div>
       <div class="feedback" id="fb"></div>
     </div>`;
  $('actionArea').innerHTML='';
}
function answerQuiz(i){
  const q=quizList[quizIdx];
  const btns=[...document.querySelectorAll('#opts .opt')];
  const chosen=q.opts[i], correct=(chosen===q.answer);
  btns.forEach(b=>b.disabled=true);
  btns.forEach(b=>{ if(b.textContent===q.answer) b.classList.add('correct'); });
  if(!correct){ btns[i].classList.add('wrong'); sndNo(); } else { sndOk(); }
  if(correct) quizCorrect++;
  $('fb').className='feedback '+(correct?'ok':'no');
  $('fb').textContent = correct?'정답! ✓':'오답 — 위 초록색이 정답입니다';
  $('actionArea').innerHTML=`<button class="btn btn-primary" onclick="nextQuiz()">${quizIdx+1<quizList.length?'다음':'결과 보기'}</button>`;
}
function nextQuiz(){ quizIdx++; renderQuiz(); }
function updateQuizProgress(){
  const pct=Math.round(quizIdx/quizList.length*100);
  $('progFill').style.width=pct+'%';
  $('remainLabel').textContent=`문항 ${Math.min(quizIdx+1,quizList.length)} / ${quizList.length}`;
  $('scoreLabel').innerHTML=`<b>${quizCorrect}</b> 정답`;
}

/* ===================== 모드3 · 후킹 판별 (예시 A·B) ===================== */
function startHook(cat){
  let pool=poolOf(cat).filter(isCopy);
  const allEx=CARDS.filter(isCopy);
  if(pool.length<2) pool=allEx.slice();           // 예시 부족하면 전체 카피 풀 사용
  quizList=shuffle(pool.slice()).map(c=>{
    const distractCard=sample(allEx,1,c)[0];
    const pair=shuffle([{txt:c.example,ok:true},{txt:distractCard.example,ok:false}]);
    return {card:c, pair};
  });
  quizIdx=0; quizCorrect=0; startTime=Date.now();
  renderHook();
}
function renderHook(){
  if(quizIdx>=quizList.length){ finishQuizLike('🎯','후킹 판별 완료!'); return; }
  const q=quizList[quizIdx];
  updateQuizProgress();
  $('card').innerHTML=
    `<span class="tag">${esc(q.card.category)}</span>
     <div style="flex:1">
       <div class="q-head">이 기법을 보여주는 카피는?</div>
       <div class="q-title">${esc(q.card.front)}</div>
       <div class="q-sub">${esc(q.card.meaning)}</div>
       <div class="options" id="opts">
         ${q.pair.map((p,i)=>`<button class="opt" onclick="answerHook(${i})"><span class="ab-tag">${i===0?'A':'B'}</span>${esc(p.txt)}</button>`).join('')}
       </div>
       <div class="feedback" id="fb"></div>
     </div>`;
  $('actionArea').innerHTML='';
}
function answerHook(i){
  const q=quizList[quizIdx];
  const btns=[...document.querySelectorAll('#opts .opt')];
  const correct=q.pair[i].ok;
  btns.forEach((b,idx)=>{ b.disabled=true; if(q.pair[idx].ok) b.classList.add('correct'); });
  if(!correct){ btns[i].classList.add('wrong'); sndNo(); } else { sndOk(); }
  if(correct) quizCorrect++;
  $('fb').className='feedback '+(correct?'ok':'no');
  $('fb').textContent = correct?'정답! ✓ 이 카피가 해당 기법입니다':'오답 — 초록색이 이 기법의 예시입니다';
  $('actionArea').innerHTML=`<button class="btn btn-primary" onclick="nextHook()">${quizIdx+1<quizList.length?'다음':'결과 보기'}</button>`;
}
function nextHook(){ quizIdx++; renderHook(); }

/* 퀴즈/후킹 공통 완료 */
function finishQuizLike(icon,title){
  const total=quizList.length;
  const acc=total?Math.round(quizCorrect/total*100):0;
  const t=fmtTime(Date.now()-startTime);
  const lead = acc>=80?'훌륭해요! 거의 다 맞혔습니다.':acc>=50?'좋아요 — 틀린 개념만 카드 학습으로 보강하세요.':'카드 학습(백지 인출)으로 먼저 다지고 다시 도전!';
  doneScreen(icon,title,lead,[
    ['정답',`${quizCorrect}/${total}`],['정확도',`${acc}%`],['소요 시간',t]
  ]);
}

/* ===== 공통 완료 화면 ===== */
function fmtTime(ms){const s=Math.round(ms/1000);return s<60?`${s}초`:`${Math.floor(s/60)}분 ${s%60}초`;}
function doneScreen(icon,title,lead,stats){
  $('topbar').classList.remove('show');
  $('doneScreen').innerHTML=
    `<div class="done">
       <div class="check">${icon}</div>
       <h2>${title}</h2>
       <div class="lead">${lead}</div>
       <div class="stats">${stats.map(s=>`<div class="stat"><div class="num">${s[1]}</div><div class="lbl">${s[0]}</div></div>`).join('')}</div>
       <div class="done-btns">
         <button class="btn btn-primary" onclick="startSession('${lastCat}')">다시 도전</button>
         <button class="btn btn-ghost" onclick="backToStart()">모드·카테고리 바꾸기</button>
       </div>
     </div>`;
  showScreen('doneScreen');
}
function backToStart(){ $('topbar').classList.remove('show'); renderStart(); showScreen('startScreen'); }

/* ===== 초기화 ===== */
renderStart();
console.log('카드 총수:',CARDS.length,'/ 카테고리:',[...new Set(CARDS.map(c=>c.category))].length,'종 / 예시 보유:',CARDS.filter(c=>c.example).length);
</script>
